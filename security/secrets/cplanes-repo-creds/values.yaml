# Values for cplanes-repo-creds.
#
# The chart renders one ExternalSecret per ArgoCD namespace listed in
# `instances`. Each ExternalSecret pulls the GitHub PAT from
# Vault path `kv/forge/github` (key `pat`) via ClusterSecretStore
# `vault-forge`, and templates a Secret named `cplanes-repo` with the
# ArgoCD repo-cred shape:
#   type: git
#   url: https://github.com/GaddipatiSriram/cplanes.git
#   username: <repoUsername>
#   password: <pat from Vault>
# labeled argocd.argoproj.io/secret-type=repository.
#
# Once SecretSynced=True, the bootstrap kubectl-applied PAT-backed
# Secret can be deleted; ESO takes ownership going forward.

repoUrl: https://github.com/GaddipatiSriram/cplanes.git
repoUsername: GaddipatiSriram

# Vault source
vault:
  storeRef:
    name: vault-forge
    kind: ClusterSecretStore
  remoteKey: forge/github     # kv/data/forge/github
  remoteProperty: pat          # the field that holds the PAT

# ArgoCD instance namespaces that should receive the Secret
instances:
  - argocd-sre
  - argocd-devops

refreshInterval: 1h
