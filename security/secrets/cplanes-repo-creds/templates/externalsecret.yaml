# One ExternalSecret per entry in .Values.instances.
# Each renders a Secret named cplanes-repo in the corresponding ArgoCD
# namespace (argocd-sre, argocd-devops) with the ArgoCD repo-cred shape.
#
# The bootstrap kubectl-applied cplanes-repo Secret was Opaque + plaintext
# password. ESO's `creationPolicy: Owner` means it will overwrite that
# Secret with the Vault-sourced one — no manual delete needed once this
# Application syncs.

{{- range $ns := .Values.instances }}
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cplanes-repo
  namespace: {{ $ns }}
  annotations:
    argocd.argoproj.io/sync-wave: "3"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  refreshInterval: {{ $.Values.refreshInterval }}
  secretStoreRef:
    name: {{ $.Values.vault.storeRef.name }}
    kind: {{ $.Values.vault.storeRef.kind }}
  target:
    name: cplanes-repo
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      metadata:
        labels:
          argocd.argoproj.io/secret-type: repository
      data:
        type: git
        url: {{ $.Values.repoUrl | quote }}
        username: {{ $.Values.repoUsername | quote }}
        password: "{{ `{{ .pat }}` }}"
  data:
    - secretKey: pat
      remoteRef:
        key: {{ $.Values.vault.remoteKey }}
        property: {{ $.Values.vault.remoteProperty }}
{{- end }}
