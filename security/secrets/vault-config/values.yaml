# Declarative Vault config managed by Crossplane provider-vault.
#
# Each entry under `policies:` becomes a Policy CR; each under
# `kubernetesAuthRoles:` becomes a kubernetes/AuthBackendRole CR.
#
# Adding a new policy/role here is purely git-push — no kubectl, no
# Ansible, no `vault` CLI. Crossplane reconciles the diff against Vault.

providerConfigRef:
  name: default

policies:
  # Policy used by ESO PushSecret (running on mgmt-control as Crossplane's
  # provider-keycloak emits connection Secrets there) to write OIDC client
  # secrets into Vault. Replaces the keycloak-secret-sync Job's policy.
  keycloak-clients-writer:
    hcl: |
      path "kv/data/forge/keycloak/clients/*" {
        capabilities = ["create", "update", "read"]
      }
      # KV v2 metadata is touched by ESO PushSecret on every write.
      path "kv/metadata/forge/keycloak/clients/*" {
        capabilities = ["create", "update", "read", "list", "delete"]
      }

  # cert-manager calls pki/sign/platform-ingress to mint a TLS cert from
  # the vault-pki ClusterIssuer.  No other PKI capability needed (the role
  # itself enforces what CN/SAN/duration is permitted — see
  # `vault read pki/roles/platform-ingress`).
  #
  # Same policy used by every cluster's cert-manager (one global policy,
  # bound by per-cluster AuthBackendRoles below).
  #
  # NOTE: this policy may already exist in Vault from the original
  # imperative bootstrap.  Crossplane's provider-vault treats Policy as
  # upsert — if the HCL matches, no-op; if it differs, the controller
  # updates Vault to match this declaration.
  cert-manager-issuer:
    hcl: |
      path "pki/sign/platform-ingress" {
        capabilities = ["update"]
      }

  # oauth2-proxy cookie secret is no longer touched by any sync flow —
  # if you need to seed/rotate it, do so manually:
  #   vault kv put kv/forge/oauth2-proxy/cookie-secret \
  #     cookie_secret=$(head -c 32 /dev/urandom | base64)
  # Considered: bring the cookie under Crossplane (provider-vault's KVSecretV2)
  # so it's also declarative — open work, see todo.md.

kubernetesAuthRoles:
  # ESO on mgmt-control authenticates with this role to push the connection
  # Secrets emitted by provider-keycloak's Client CRs back to Vault.
  keycloak-clients-writer:
    backend: "kubernetes-mgmt-control"
    boundServiceAccountNames:
      - external-secrets
    boundServiceAccountNamespaces:
      - external-secrets
    tokenPolicies:
      - keycloak-clients-writer
    tokenTtl: 600

  # cert-manager on every cluster authenticates against its OWN k8s auth
  # mount with role name `cert-manager-issuer` (uniform across clusters).
  # The K8s CR name is per-cluster to avoid collision; `roleName` field
  # decouples the Vault role name from the CR name.
  #
  # cert-manager on mgmt-forge already has this role from the imperative
  # bootstrap; Crossplane upsert is no-op if HCL/binding match.
  cert-manager-issuer-forge:
    backend: "kubernetes-mgmt-forge"
    roleName: "cert-manager-issuer"
    boundServiceAccountNames:
      - cert-manager
    boundServiceAccountNamespaces:
      - cert-manager
    tokenPolicies:
      - cert-manager-issuer
    tokenTtl: 600

  cert-manager-issuer-control:
    backend: "kubernetes-mgmt-control"
    roleName: "cert-manager-issuer"
    boundServiceAccountNames:
      - cert-manager
    boundServiceAccountNamespaces:
      - cert-manager
    tokenPolicies:
      - cert-manager-issuer
    tokenTtl: 600

  cert-manager-issuer-observability:
    backend: "kubernetes-mgmt-observability"
    roleName: "cert-manager-issuer"
    boundServiceAccountNames:
      - cert-manager
    boundServiceAccountNamespaces:
      - cert-manager
    tokenPolicies:
      - cert-manager-issuer
    tokenTtl: 600
