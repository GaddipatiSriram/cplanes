# Declarative Vault config managed by Crossplane provider-vault.
#
# Each entry under `policies:` becomes a Policy CR; each under
# `kubernetesAuthRoles:` becomes a kubernetes/AuthBackendRole CR.
#
# Adding a new policy/role here is purely git-push — no kubectl, no
# Ansible, no `vault` CLI. Crossplane reconciles the diff against Vault.

providerConfigRef:
  name: default

policies:
  # Policy for the keycloak-secret-sync Job — write client secrets and the
  # oauth2-proxy cookie secret.
  keycloak-secret-sync:
    hcl: |
      path "kv/data/forge/keycloak/clients/*" {
        capabilities = ["create", "update", "read"]
      }
      path "kv/data/forge/oauth2-proxy/cookie-secret" {
        capabilities = ["create", "update", "read"]
      }

kubernetesAuthRoles:
  # Binds keycloak-secret-sync SA in the keycloak namespace on mgmt-forge
  # to the keycloak-secret-sync policy. Mount path matches the per-cluster
  # auth method created by the cluster bootstrap.
  keycloak-secret-sync:
    backend: "kubernetes-mgmt-forge"
    boundServiceAccountNames:
      - keycloak-secret-sync
    boundServiceAccountNamespaces:
      - keycloak
    tokenPolicies:
      - keycloak-secret-sync
    tokenTtl: 600
