# Declarative Vault config managed by Crossplane provider-vault.
#
# Each entry under `policies:` becomes a Policy CR; each under
# `kubernetesAuthRoles:` becomes a kubernetes/AuthBackendRole CR.
#
# Adding a new policy/role here is purely git-push — no kubectl, no
# Ansible, no `vault` CLI. Crossplane reconciles the diff against Vault.

providerConfigRef:
  name: default

policies:
  # Policy used by ESO PushSecret (running on mgmt-control as Crossplane's
  # provider-keycloak emits connection Secrets there) to write OIDC client
  # secrets into Vault. Replaces the keycloak-secret-sync Job's policy.
  keycloak-clients-writer:
    hcl: |
      path "kv/data/forge/keycloak/clients/*" {
        capabilities = ["create", "update", "read"]
      }

  # oauth2-proxy cookie secret is no longer touched by any sync flow —
  # if you need to seed/rotate it, do so manually:
  #   vault kv put kv/forge/oauth2-proxy/cookie-secret \
  #     cookie_secret=$(head -c 32 /dev/urandom | base64)
  # Considered: bring the cookie under Crossplane (provider-vault's KVSecretV2)
  # so it's also declarative — open work, see todo.md.

kubernetesAuthRoles:
  # ESO on mgmt-control authenticates with this role to push the connection
  # Secrets emitted by provider-keycloak's Client CRs back to Vault.
  keycloak-clients-writer:
    backend: "kubernetes-mgmt-control"
    boundServiceAccountNames:
      - external-secrets
    boundServiceAccountNamespaces:
      - external-secrets
    tokenPolicies:
      - keycloak-clients-writer
    tokenTtl: 600
