{{- range $name, $cfg := .Values.kubernetesAuthRoles }}
---
apiVersion: kubernetes.vault.upbound.io/v1alpha1
kind: AuthBackendRole
metadata:
  name: {{ $name | quote }}
  labels:
    app.kubernetes.io/name: {{ $name }}
    app.kubernetes.io/part-of: vault-config
spec:
  forProvider:
    backend: {{ $cfg.backend | quote }}
    # Vault role name. Defaults to the K8s CR name ($name) for backwards
    # compat with single-cluster roles; explicit `roleName:` lets the
    # same role name (e.g. cert-manager-issuer) live on multiple auth
    # backends without K8s CR name collisions.
    roleName: {{ $cfg.roleName | default $name | quote }}
    boundServiceAccountNames:
      {{- range $cfg.boundServiceAccountNames }}
      - {{ . | quote }}
      {{- end }}
    boundServiceAccountNamespaces:
      {{- range $cfg.boundServiceAccountNamespaces }}
      - {{ . | quote }}
      {{- end }}
    tokenPolicies:
      {{- range $cfg.tokenPolicies }}
      - {{ . | quote }}
      {{- end }}
    tokenTtl: {{ $cfg.tokenTtl }}
  providerConfigRef:
    name: {{ $.Values.providerConfigRef.name | quote }}
{{- end }}
