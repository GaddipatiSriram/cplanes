apiVersion: v2
name: vault-config
description: |
  Declarative Vault configuration via Crossplane provider-vault. Holds the
  Policy + AuthBackendRole CRs that used to be bootstrapped imperatively
  via `vault policy write` / `vault write auth/.../role/...` from
  vault/playbooks/configure.yml.

  Deploys to mgmt-control (where Crossplane lives), not mgmt-forge (where
  Vault itself runs) — the CRs are managed objects in the Crossplane
  cluster; provider-vault reaches Vault over the network using
  ProviderConfig credentials from the crossplane-providers chart.

  Order of dependencies:
    crossplane (chart) → crossplane-providers (chart) → vault-config (this).
type: application
version: 0.1.0
appVersion: "0.1.0"
