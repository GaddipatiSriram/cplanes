# Values for the forge cert-manager umbrella chart.
# Everything under `cert-manager:` is passed to the upstream jetstack chart
# (subchart name must match dependency .name in Chart.yaml).

cert-manager:
  # Install CRDs (Certificate, Issuer, ClusterIssuer, etc.) with the chart.
  # Separate CRD management (helm install with --skip-crds + raw CRD apply)
  # is an enterprise pattern we can migrate to later.
  installCRDs: true

  replicaCount: 1

  prometheus:
    enabled: false        # flip to true once observability cluster is wired

  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

  webhook:
    replicaCount: 1
    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

  cainjector:
    replicaCount: 1
    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi

# =============================================================================
# Vault PKI ClusterIssuer (templates/clusterissuer-vault-pki.yaml)
# =============================================================================
# Renders one ClusterIssuer per cluster, all named `vault-pki`, all pointing
# at vault.apps.mgmt-forge.engatwork.com but each authenticating via its own
# `kubernetes-<cluster>` auth mount (set by the cert-manager AppSet).
#
# To rename or disable cluster-wide, flip `enabled: false` here.
vaultPki:
  enabled: true
  name: vault-pki

  # Cross-cluster reachable; same URL ESO uses to read KV from Vault.
  server: "https://vault.apps.mgmt-forge.engatwork.com"

  # PKI sign path bootstrapped at Vault setup. Cert role `platform-ingress`
  # was configured imperatively (vault write pki/roles/platform-ingress ...).
  signPath: "pki/sign/platform-ingress"

  # Default; cert-manager AppSet overrides per cluster:
  #   helm.parameters: vaultPki.kubernetesAuthMount: 'kubernetes-{{name}}'
  kubernetesAuthMount: "kubernetes-mgmt-forge"

  # Vault role + policy on the kubernetesAuthMount. The role is created by
  # vault-config Crossplane (one AuthBackendRole per cluster's auth mount,
  # all bound to the cert-manager SA).
  kubernetesAuthRole: "cert-manager-issuer"
  serviceAccountName: "cert-manager"

  # engatwork.com Root CA — same value committed in
  # cplanes/security/secrets/external-secrets/values.yaml.  CA certs aren't
  # secrets, OK in git. Rotate by updating both files when the root rolls.
