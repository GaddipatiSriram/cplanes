# Writer ClusterSecretStore for keycloak-clients-* PushSecrets.
#
# The default vault-forge ClusterSecretStore (in external-secrets chart) uses
# the read-only `forge-reader` Vault role — sufficient for ExternalSecret
# (read), but PushSecret needs write capability. This second store
# authenticates against the same Vault under the `keycloak-clients-writer`
# role, which has write access to kv/{data,metadata}/forge/keycloak/clients/*.
#
# The role + policy are declared in security/secrets/vault-config/values.yaml
# and reconciled by Crossplane provider-vault.

apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: {{ .Values.vaultSecretStore.name | quote }}
  annotations:
    argocd.argoproj.io/sync-wave: "0"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  provider:
    vault:
      server: {{ .Values.vaultSecretStore.serverUrl | quote }}
      caBundle: {{ .Values.vaultSecretStore.caBundle | b64enc | quote }}
      path: "kv"
      version: "v2"
      auth:
        kubernetes:
          mountPath: {{ .Values.vaultSecretStore.authMount | quote }}
          role: {{ .Values.vaultSecretStore.authRole | quote }}
          serviceAccountRef:
            name: {{ .Values.vaultSecretStore.esoServiceAccount.name | quote }}
            namespace: {{ .Values.vaultSecretStore.esoServiceAccount.namespace | quote }}
