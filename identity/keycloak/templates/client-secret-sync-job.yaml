# =============================================================================
# Client-secret-sync Job
# Pulls auto-generated OIDC client secrets out of Keycloak (created by
# realm-import-cm.yaml) and writes them to Vault so ESO can sync them into
# the consumer namespaces (oauth2-proxy on mgmt-control, backstage on
# mgmt-control).
#
# Vault paths written:
#   kv/forge/keycloak/clients/apps-launcher   -> {client_id, client_secret}
#   kv/forge/keycloak/clients/backstage       -> {client_id, client_secret}
#   kv/forge/oauth2-proxy/cookie-secret       -> {cookie_secret}  (created
#       only if absent — never overwritten, so oauth2-proxy sessions survive)
#
# How it runs:
#   - argocd PostSync hook so it fires AFTER Keycloak StatefulSet is healthy
#   - hook-delete-policy: BeforeHookCreation,HookSucceeded — cleans up old
#     pods so each sync produces a fresh Job
#
# Vault prereqs (declarative, via Crossplane provider-vault):
#   - Policy keycloak-secret-sync     ← security/secrets/vault-config/values.yaml
#   - AuthBackendRole keycloak-secret-sync at mount kubernetes-mgmt-forge
#                                     ← security/secrets/vault-config/values.yaml
#
# One-time manual bootstrap is needed for Crossplane itself to talk to
# Vault — see control/crossplane-providers/values.yaml header. Once that
# token exists, every other Vault config (this Job's policy + role
# included) is git-push-only.
#
# Note: the existing forge-reader policy used by ESO must already grant
# read on kv/data/forge/* (or be broadened) so oauth2-proxy and backstage
# can pull these client secrets into their namespaces. forge-reader is
# managed out-of-band today; bring it under vault-config in a follow-up.
# =============================================================================

apiVersion: v1
kind: ServiceAccount
metadata:
  name: keycloak-secret-sync
  labels:
    app.kubernetes.io/name: keycloak-secret-sync
    app.kubernetes.io/part-of: identity
---
apiVersion: batch/v1
kind: Job
metadata:
  name: keycloak-client-secret-sync
  labels:
    app.kubernetes.io/name: keycloak-secret-sync
    app.kubernetes.io/part-of: identity
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
spec:
  backoffLimit: 5
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: keycloak-secret-sync
    spec:
      serviceAccountName: keycloak-secret-sync
      restartPolicy: OnFailure
      containers:
        - name: sync
          image: alpine:3.20
          envFrom:
            - secretRef:
                name: keycloak-admin
          env:
            - name: KEYCLOAK_URL
              value: "http://keycloak-keycloakx-http.keycloak.svc.cluster.local/auth"
            - name: VAULT_ADDR
              value: "http://vault.vault.svc.cluster.local:8200"
            - name: VAULT_AUTH_MOUNT
              value: "kubernetes-mgmt-forge"
            - name: VAULT_ROLE
              value: "keycloak-secret-sync"
            - name: REALM
              value: "engatwork"
            - name: CLIENTS
              value: "apps-launcher backstage argocd-sre argocd-devops"
          command: ["/bin/sh", "-eu", "-c"]
          args:
            - |
              apk add --no-cache curl jq >/dev/null

              echo "==> Logging into Keycloak as admin"
              KC_TOKEN=$(curl -sf -X POST "${KEYCLOAK_URL}/realms/master/protocol/openid-connect/token" \
                -d "grant_type=password" \
                -d "client_id=admin-cli" \
                -d "username=${KEYCLOAK_ADMIN}" \
                --data-urlencode "password=${KEYCLOAK_ADMIN_PASSWORD}" \
                | jq -er .access_token)

              echo "==> Authenticating to Vault via kubernetes auth (${VAULT_AUTH_MOUNT})"
              SA_JWT=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
              VAULT_TOKEN=$(curl -sf -X POST "${VAULT_ADDR}/v1/auth/${VAULT_AUTH_MOUNT}/login" \
                -d "{\"role\":\"${VAULT_ROLE}\",\"jwt\":\"${SA_JWT}\"}" \
                | jq -er .auth.client_token)

              for CLIENT in $CLIENTS; do
                echo "==> Syncing client: ${CLIENT}"
                UUID=$(curl -sf -H "Authorization: Bearer ${KC_TOKEN}" \
                  "${KEYCLOAK_URL}/admin/realms/${REALM}/clients?clientId=${CLIENT}" \
                  | jq -er '.[0].id')

                SECRET=$(curl -sf -H "Authorization: Bearer ${KC_TOKEN}" \
                  "${KEYCLOAK_URL}/admin/realms/${REALM}/clients/${UUID}/client-secret" \
                  | jq -er .value)

                curl -sf -X POST -H "X-Vault-Token: ${VAULT_TOKEN}" \
                  -H "Content-Type: application/json" \
                  -d "{\"data\":{\"client_id\":\"${CLIENT}\",\"client_secret\":\"${SECRET}\"}}" \
                  "${VAULT_ADDR}/v1/kv/data/forge/keycloak/clients/${CLIENT}" >/dev/null

                echo "    wrote kv/forge/keycloak/clients/${CLIENT}"
              done

              echo "==> Seeding oauth2-proxy cookie secret (only if absent)"
              EXISTING=$(curl -s -o /dev/null -w "%{http_code}" -H "X-Vault-Token: ${VAULT_TOKEN}" \
                "${VAULT_ADDR}/v1/kv/data/forge/oauth2-proxy/cookie-secret")
              if [ "$EXISTING" = "404" ]; then
                COOKIE=$(head -c 32 /dev/urandom | base64 | tr -d '\n')
                curl -sf -X POST -H "X-Vault-Token: ${VAULT_TOKEN}" \
                  -H "Content-Type: application/json" \
                  -d "{\"data\":{\"cookie_secret\":\"${COOKIE}\"}}" \
                  "${VAULT_ADDR}/v1/kv/data/forge/oauth2-proxy/cookie-secret" >/dev/null
                echo "    seeded kv/forge/oauth2-proxy/cookie-secret"
              else
                echo "    cookie-secret already present (HTTP ${EXISTING}); leaving untouched"
              fi

              echo "==> Done."
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
