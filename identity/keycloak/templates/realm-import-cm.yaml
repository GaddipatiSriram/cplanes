# Realm import ConfigMap — declarative realm + OIDC clients for the homelab.
#
# How it works:
#   - This ConfigMap is mounted into the Keycloak pod at
#     /opt/keycloak/data/import/engatwork-realm.json (see values.yaml
#     extraVolumes / extraVolumeMounts).
#   - The pod command includes `--import-realm`, which on startup imports any
#     JSON files in /opt/keycloak/data/import.
#   - Default import strategy is IGNORE_EXISTING, so subsequent pod restarts
#     are no-ops once the realm exists. Edits made via the admin console
#     after first import are NOT clobbered (and conversely, edits to this
#     file after first import won't reach a running realm — drift is real).
#     For destructive re-imports, set
#     KC_SPI_IMPORT_SINGLE_FILE_STRATEGY=OVERWRITE_EXISTING (don't).
#
# Clients defined here:
#   - apps-launcher  — confidential OIDC client used by oauth2-proxy in front
#                      of Homer (SSO launcher at home.apps.mgmt-control...).
#   - backstage      — confidential OIDC client used by Backstage's OIDC
#                      auth-backend plugin (SRE catalog at backstage.apps...).
#
# Client secrets are NOT specified — Keycloak generates them on import. The
# next session adds a one-shot Job that harvests them via kcadm.sh and writes
# to Vault, after which ESO syncs them into the consuming namespaces.
#
# Realm-level choices:
#   - registrationAllowed: false — admins create users; no self-signup
#   - rememberMe: true            — convenience for a learning homelab
#   - resetPasswordAllowed: true  — operator can reset their own password

apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-realm-import
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/part-of: identity
data:
  engatwork-realm.json: |
    {
      "realm": "engatwork",
      "enabled": true,
      "displayName": "engatwork homelab",
      "displayNameHtml": "<b>engatwork</b> homelab",
      "registrationAllowed": false,
      "resetPasswordAllowed": true,
      "rememberMe": true,
      "loginWithEmailAllowed": true,
      "duplicateEmailsAllowed": false,
      "sslRequired": "external",
      "accessTokenLifespan": 300,
      "ssoSessionIdleTimeout": 1800,
      "ssoSessionMaxLifespan": 36000,
      "groups": [
        {
          "name": "platform-users",
          "path": "/platform-users",
          "attributes": {}
        },
        {
          "name": "platform-sre",
          "path": "/platform-sre",
          "attributes": {}
        }
      ],
      "defaultGroups": ["/platform-users"],
      "clients": [
        {
          "clientId": "apps-launcher",
          "name": "engatwork apps launcher (Homer + oauth2-proxy)",
          "description": "OIDC client used by oauth2-proxy in front of Homer to gate the homelab landing page.",
          "enabled": true,
          "protocol": "openid-connect",
          "publicClient": false,
          "standardFlowEnabled": true,
          "implicitFlowEnabled": false,
          "directAccessGrantsEnabled": false,
          "serviceAccountsEnabled": false,
          "rootUrl": "https://home.apps.mgmt-control.engatwork.com",
          "baseUrl": "/",
          "redirectUris": [
            "https://home.apps.mgmt-control.engatwork.com/oauth2/callback"
          ],
          "webOrigins": [
            "https://home.apps.mgmt-control.engatwork.com"
          ],
          "attributes": {
            "post.logout.redirect.uris": "https://home.apps.mgmt-control.engatwork.com"
          },
          "defaultClientScopes": ["web-origins", "profile", "roles", "email"],
          "optionalClientScopes": ["address", "phone", "offline_access", "microprofile-jwt"]
        },
        {
          "clientId": "backstage",
          "name": "Backstage developer portal",
          "description": "OIDC client used by the Backstage auth-backend OIDC provider plugin.",
          "enabled": true,
          "protocol": "openid-connect",
          "publicClient": false,
          "standardFlowEnabled": true,
          "implicitFlowEnabled": false,
          "directAccessGrantsEnabled": false,
          "serviceAccountsEnabled": false,
          "rootUrl": "https://backstage.apps.mgmt-control.engatwork.com",
          "baseUrl": "/",
          "redirectUris": [
            "https://backstage.apps.mgmt-control.engatwork.com/api/auth/oidc/handler/frame"
          ],
          "webOrigins": [
            "https://backstage.apps.mgmt-control.engatwork.com"
          ],
          "attributes": {
            "post.logout.redirect.uris": "https://backstage.apps.mgmt-control.engatwork.com"
          },
          "defaultClientScopes": ["web-origins", "profile", "roles", "email"],
          "optionalClientScopes": ["address", "phone", "offline_access", "microprofile-jwt"]
        },
        {
          "clientId": "argocd-sre",
          "name": "ArgoCD — SRE instance",
          "description": "OIDC client for argocd-sre (platform GitOps). Reads via configs.cm.oidc.config.",
          "enabled": true,
          "protocol": "openid-connect",
          "publicClient": false,
          "standardFlowEnabled": true,
          "implicitFlowEnabled": false,
          "directAccessGrantsEnabled": false,
          "serviceAccountsEnabled": false,
          "rootUrl": "https://argocd-sre.apps.mgmt-control.engatwork.com",
          "baseUrl": "/",
          "redirectUris": [
            "https://argocd-sre.apps.mgmt-control.engatwork.com/auth/callback",
            "http://localhost:8085/auth/callback"
          ],
          "webOrigins": [
            "https://argocd-sre.apps.mgmt-control.engatwork.com"
          ],
          "attributes": {
            "post.logout.redirect.uris": "https://argocd-sre.apps.mgmt-control.engatwork.com"
          },
          "defaultClientScopes": ["web-origins", "profile", "roles", "email", "groups"],
          "optionalClientScopes": ["address", "phone", "offline_access", "microprofile-jwt"]
        },
        {
          "clientId": "argocd-devops",
          "name": "ArgoCD — DevOps instance",
          "description": "OIDC client for argocd-devops (application GitOps). Reads via configs.cm.oidc.config.",
          "enabled": true,
          "protocol": "openid-connect",
          "publicClient": false,
          "standardFlowEnabled": true,
          "implicitFlowEnabled": false,
          "directAccessGrantsEnabled": false,
          "serviceAccountsEnabled": false,
          "rootUrl": "https://argocd-devops.apps.mgmt-control.engatwork.com",
          "baseUrl": "/",
          "redirectUris": [
            "https://argocd-devops.apps.mgmt-control.engatwork.com/auth/callback",
            "http://localhost:8085/auth/callback"
          ],
          "webOrigins": [
            "https://argocd-devops.apps.mgmt-control.engatwork.com"
          ],
          "attributes": {
            "post.logout.redirect.uris": "https://argocd-devops.apps.mgmt-control.engatwork.com"
          },
          "defaultClientScopes": ["web-origins", "profile", "roles", "email", "groups"],
          "optionalClientScopes": ["address", "phone", "offline_access", "microprofile-jwt"]
        }
      ],
      "clientScopes": [
        {
          "name": "groups",
          "description": "OpenID Connect scope mapping a user's groups into the ID token.",
          "protocol": "openid-connect",
          "attributes": {
            "include.in.token.scope": "true",
            "display.on.consent.screen": "true"
          },
          "protocolMappers": [
            {
              "name": "groups",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-group-membership-mapper",
              "consentRequired": false,
              "config": {
                "full.path": "false",
                "id.token.claim": "true",
                "access.token.claim": "true",
                "userinfo.token.claim": "true",
                "claim.name": "groups"
              }
            }
          ]
        }
      ]
    }
