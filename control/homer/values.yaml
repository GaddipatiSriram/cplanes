# Homer SSO landing page — gated by oauth2-proxy via nginx auth-url subrequest.
#
# Both this chart and oauth2-proxy share host home.apps.mgmt-control.engatwork.com.
#   /oauth2/* → oauth2-proxy ingress (in cplanes/networking/oauth2-proxy)
#   /*        → this Homer ingress, with auth-url annotations forcing nginx
#               to subrequest oauth2-proxy's /oauth2/auth before serving any
#               request.
#
# Updating tiles:
#   - Edit `config.services` below. ArgoCD reconciles within ~3 min;
#     deployment auto-rolls thanks to checksum/config annotation.

image:
  repository: b4bz/homer
  tag: "v25.10.1"
  pullPolicy: IfNotPresent

replicas: 1

resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    cpu: 200m
    memory: 128Mi

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: true
  className: nginx
  host: home.apps.mgmt-control.engatwork.com
  annotations:
    cert-manager.io/cluster-issuer: vault-pki
    # Auth subrequest — every request is forwarded to oauth2-proxy at
    # /oauth2/auth. 202 means "let it through"; 401 means "not authenticated".
    nginx.ingress.kubernetes.io/auth-url: "https://home.apps.mgmt-control.engatwork.com/oauth2/auth"
    # On 401, redirect the browser to /oauth2/start, which begins the OIDC
    # dance with Keycloak and lands back at /oauth2/callback. $escaped_request_uri
    # is the original URL so the user lands where they intended after login.
    nginx.ingress.kubernetes.io/auth-signin: "https://home.apps.mgmt-control.engatwork.com/oauth2/start?rd=$escaped_request_uri"
    # Forward identity headers downstream so Homer (or any future replacement)
    # can read the authenticated user.
    nginx.ingress.kubernetes.io/auth-response-headers: "X-Auth-Request-User, X-Auth-Request-Email"
  tls:
    enabled: true
    secretName: home-tls

