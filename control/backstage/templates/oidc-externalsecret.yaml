# ExternalSecret — pulls Backstage's OIDC client credentials from Vault into
# Secret/backstage-oidc. Reads from kv/forge/keycloak/clients/backstage,
# populated by the keycloak-client-secret-sync Job on mgmt-forge.
#
# Env-var names (AUTH_OIDC_*) match the convention used by Backstage's
# @backstage/plugin-auth-backend-module-oidc-provider when configured to read
# from env via the standard `${AUTH_OIDC_CLIENT_ID}` substitution in
# app-config.yaml. Once the custom Backstage image lands with that plugin
# wired in, the deployment's pod template just needs to envFrom this Secret.

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: backstage-oidc
  annotations:
    argocd.argoproj.io/sync-wave: "0"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-forge
    kind: ClusterSecretStore
  target:
    name: backstage-oidc
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: AUTH_OIDC_CLIENT_ID
      remoteRef:
        key: forge/keycloak/clients/backstage
        property: client_id
    - secretKey: AUTH_OIDC_CLIENT_SECRET
      remoteRef:
        key: forge/keycloak/clients/backstage
        property: client_secret
# Issuer URL is NOT a secret — hardcode it as
# https://keycloak.apps.mgmt-forge.engatwork.com/auth/realms/engatwork
# inside the custom Backstage image's app-config.production.yaml.
