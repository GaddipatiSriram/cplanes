# Render Secret/vault-credentials with the JSON blob provider-vault expects:
#   { "token": "<hvs....>" }
#
# The token comes from kv/forge/crossplane/vault-token (one-time manual
# bootstrap — see values.yaml header). ESO refreshes every refreshInterval,
# so token rotation is just `vault kv put` against that path.

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: vault-credentials
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval | quote }}
  secretStoreRef:
    name: {{ .Values.externalSecret.secretStoreRef.name | quote }}
    kind: {{ .Values.externalSecret.secretStoreRef.kind | quote }}
  target:
    name: vault-credentials
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      data:
        credentials: |
          {"token": "{{ "{{" }} .token {{ "}}" }}"}
  data:
    - secretKey: token
      remoteRef:
        key: {{ .Values.externalSecret.vaultToken.vaultPath | quote }}
        property: token
