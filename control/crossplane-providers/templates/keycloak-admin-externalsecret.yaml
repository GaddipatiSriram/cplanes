# Pulls Keycloak admin credentials from Vault (kv/forge/keycloak) into
# Secret/keycloak-admin in crossplane-system, formatted for provider-keycloak's
# ProviderConfig (`username` + `password` keys).
#
# Same Vault path the Keycloak pod itself reads for bootstrap admin
# credentials — single source of truth for the admin login.

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: keycloak-admin
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval | quote }}
  secretStoreRef:
    name: {{ .Values.externalSecret.secretStoreRef.name | quote }}
    kind: {{ .Values.externalSecret.secretStoreRef.kind | quote }}
  target:
    name: {{ .Values.providerConfig.keycloak.secretName | quote }}
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: username
      remoteRef:
        key: {{ .Values.externalSecret.keycloakAdmin.vaultPath | quote }}
        property: {{ .Values.externalSecret.keycloakAdmin.usernameProperty | quote }}
    - secretKey: password
      remoteRef:
        key: {{ .Values.externalSecret.keycloakAdmin.vaultPath | quote }}
        property: {{ .Values.externalSecret.keycloakAdmin.passwordProperty | quote }}
