# Pulls Keycloak admin credentials from Vault (kv/forge/keycloak) and
# renders Secret/keycloak-credentials with the JSON blob shape that
# provider-keycloak's ProviderConfig expects:
#
#   {
#     "url":       "https://keycloak.apps.mgmt-forge.engatwork.com",
#     "base_path": "/auth",
#     "realm":     "master",
#     "client_id": "admin-cli",
#     "username":  "<from Vault>",
#     "password":  "<from Vault>"
#   }
#
# Rotating the Keycloak admin password = `vault kv put kv/forge/keycloak
# KC_BOOTSTRAP_ADMIN_PASSWORD=...`; ESO refreshes within refreshInterval.

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: keycloak-credentials
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval | quote }}
  secretStoreRef:
    name: {{ .Values.externalSecret.secretStoreRef.name | quote }}
    kind: {{ .Values.externalSecret.secretStoreRef.kind | quote }}
  target:
    name: keycloak-credentials
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      data:
        credentials: |
          {
            "url": {{ .Values.providerConfig.keycloak.url | quote }},
            "base_path": {{ .Values.providerConfig.keycloak.basePath | quote }},
            "realm": {{ .Values.providerConfig.keycloak.realm | quote }},
            "client_id": {{ .Values.providerConfig.keycloak.clientId | quote }},
            "username": "{{ "{{" }} .username {{ "}}" }}",
            "password": "{{ "{{" }} .password {{ "}}" }}"
          }
  data:
    - secretKey: username
      remoteRef:
        key: {{ .Values.externalSecret.keycloakAdmin.vaultPath | quote }}
        property: {{ .Values.externalSecret.keycloakAdmin.usernameProperty | quote }}
    - secretKey: password
      remoteRef:
        key: {{ .Values.externalSecret.keycloakAdmin.vaultPath | quote }}
        property: {{ .Values.externalSecret.keycloakAdmin.passwordProperty | quote }}
