# ProviderConfig for provider-vault using Kubernetes auth.
#
# Crossplane's provider-vault controller pod presents its in-cluster
# ServiceAccount JWT (from /var/run/secrets/kubernetes.io/serviceaccount/token)
# to the Vault role configured below. Vault validates via TokenReview
# against mgmt-control's kube-apiserver, then issues a short-lived Vault
# token scoped to the `crossplane-admin` policy.
#
# No long-lived token in Vault, no ExternalSecret, no Secret rotation.
#
# Sync wave 2 — after the Provider has installed its CRDs (wave 0).
# SkipDryRunOnMissingResource lets ArgoCD retry until the CRD is registered.
#
# NOTE: provider-vault (upbound) ProviderConfig field name for the
# Kubernetes auth login block follows the Terraform Vault provider's
# `auth_login_kubernetes` convention — translated to camelCase as
# `authLoginKubernetes`. If your installed provider version uses a
# different schema, run `kubectl explain providerconfig.spec` against the
# installed CRD to find the actual field name.

apiVersion: vault.upbound.io/v1beta1
kind: ProviderConfig
metadata:
  name: default
  labels:
    app.kubernetes.io/name: provider-vault
    app.kubernetes.io/part-of: platform
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  address: {{ .Values.providerConfig.vault.address | quote }}
  authLoginKubernetes:
    mount: {{ .Values.providerConfig.vault.auth.mount | quote }}
    role: {{ .Values.providerConfig.vault.auth.role | quote }}
