# ProviderConfig for provider-vault.
#
# Authenticates via a token stored in Secret/vault-credentials (key
# `credentials`, content `{"token": "<hvs....>"}`). The ExternalSecret in
# templates/vault-credentials-externalsecret.yaml renders that Secret from
# Vault path kv/forge/crossplane/vault-token.
#
# Why token auth (not the cleaner Kubernetes auth login):
# upbound/provider-vault's ProviderConfig spec exposes only `credentials`,
# `address`, `headers`, etc. — no first-class auth_login_kubernetes block.
# Token auth via secretRef is the supported pattern.
#
# The token is minted once with the crossplane-admin policy
# (cplanes/security/secrets/vault/playbooks/configure.yml ships that policy).
# Rotation: `vault token revoke` + re-mint + `vault kv put kv/forge/crossplane/vault-token`;
# ESO will pick up the new value within its refreshInterval.

apiVersion: vault.upbound.io/v1beta1
kind: ProviderConfig
metadata:
  name: default
  labels:
    app.kubernetes.io/name: provider-vault
    app.kubernetes.io/part-of: platform
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  address: {{ .Values.providerConfig.vault.address | quote }}
  # TODO: replace with proper CA bundle once provider-vault's ProviderConfig
  # supports it (or via DeploymentRuntimeConfig mounting the engatwork Root
  # CA into the provider pod). For now, the homelab Vault is signed by the
  # internal engatwork CA which the provider doesn't trust by default.
  skip_tls_verify: true
  credentials:
    source: Secret
    secretRef:
      namespace: crossplane-system
      name: vault-credentials
      key: credentials
