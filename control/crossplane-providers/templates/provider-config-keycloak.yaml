# ProviderConfig for provider-keycloak.
#
# Schema (v1beta1): spec.credentials only — no top-level url / realm fields.
# Connection details (url, base_path, realm, client_id) AND admin creds
# (username, password) all live inside the Secret as a JSON blob:
#
#   {
#     "url":         "https://keycloak.apps.mgmt-forge.engatwork.com",
#     "base_path":   "/auth",
#     "realm":       "master",
#     "client_id":   "admin-cli",
#     "username":    "admin",
#     "password":    "<from kv/forge/keycloak>"
#   }
#
# Rendered by templates/keycloak-credentials-externalsecret.yaml from
# kv/forge/keycloak (the same path the Keycloak pod itself uses for
# bootstrap admin creds).

apiVersion: keycloak.crossplane.io/v1beta1
kind: ProviderConfig
metadata:
  name: keycloak-default
  labels:
    app.kubernetes.io/name: provider-keycloak
    app.kubernetes.io/part-of: platform
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  credentials:
    source: Secret
    secretRef:
      namespace: crossplane-system
      name: keycloak-credentials
      key: credentials
