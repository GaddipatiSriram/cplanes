# Sync the Vault admin token from kv/forge/crossplane/vault-token into
# Secret/vault-token. Bootstrapped manually once — see values.yaml header.

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: vault-token
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval | quote }}
  secretStoreRef:
    name: {{ .Values.externalSecret.secretStoreRef.name | quote }}
    kind: {{ .Values.externalSecret.secretStoreRef.kind | quote }}
  target:
    name: {{ .Values.providerConfig.vault.secretName | quote }}
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: {{ .Values.providerConfig.vault.secretKey | quote }}
      remoteRef:
        key: {{ .Values.externalSecret.vaultPath | quote }}
        property: token
