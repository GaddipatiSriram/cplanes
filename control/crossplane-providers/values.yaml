# crossplane-providers — installs Crossplane providers and ProviderConfigs.
# Sibling to the crossplane core chart per its README.
#
# What's here today:
#   - provider-vault (upbound) — Terraform-backed Vault provider.
#   - provider-keycloak (crossplane-contrib) — Terraform-backed Keycloak provider.
#
# Both providers authenticate via Secret-mounted JSON credentials —
# the upbound/crossplane-contrib ProviderConfig schema for these
# providers exposes `credentials.source: Secret` only (no first-class
# auth_login_kubernetes block in the v1beta1 spec).
#
# Vault provider:
#   credentials Secret = vault-credentials in crossplane-system
#   key `credentials` content: {"token": "<vault token>"}
#   Token sourced from kv/forge/crossplane/vault-token.
#
# Keycloak provider:
#   credentials Secret = keycloak-credentials in crossplane-system
#   key `credentials` content: full connection JSON (url, base_path,
#     realm, client_id, username, password)
#   Username/password sourced from kv/forge/keycloak.
#
# IRREDUCIBLE BOOTSTRAP (run once on a host with the Vault root token):
#
#   # 1. Write the crossplane-admin policy + mint a long-lived token
#   #    (already created by vault/playbooks/configure.yml --tags configure).
#   #    Then mint a token and stash it in Vault for ESO to mirror:
#   TOKEN=$(kubectl --context mgmt-forge exec -n vault vault-0 -- \
#     sh -c "VAULT_TOKEN=$ROOT vault token create \
#       -policy=crossplane-admin -orphan -ttl=8760h -format=json" \
#     | jq -r .auth.client_token)
#   kubectl --context mgmt-forge exec -n vault vault-0 -- \
#     sh -c "VAULT_TOKEN=$ROOT vault kv put kv/forge/crossplane/vault-token token=$TOKEN"
#
# After this, ESO renders Secret/vault-credentials in crossplane-system
# and provider-vault comes online. Every other Vault role/policy is then
# managed by Crossplane (security/secrets/vault-config/).

provider:
  vault:
    package: "xpkg.upbound.io/upbound/provider-vault:v1.0.0"
  # provider-keycloak — wraps the mrparkers Terraform Keycloak provider.
  # CRD API groups (best-known forms; verify with `kubectl get crds | grep keycloak`
  # after first install):
  #   realm.keycloak.crossplane.io           Realm
  #   openidclient.keycloak.crossplane.io    Client, ClientScope, ClientDefaultScopes,
  #                                          GroupMembershipProtocolMapper
  #   group.keycloak.crossplane.io           Group, DefaultGroups
  keycloak:
    package: "xpkg.upbound.io/crossplane-contrib/provider-keycloak:v1.6.0"

providerConfig:
  vault:
    address: "https://vault.apps.mgmt-forge.engatwork.com"
  keycloak:
    url: "https://keycloak.apps.mgmt-forge.engatwork.com"
    basePath: "/auth"
    realm: "master"
    clientId: "admin-cli"

externalSecret:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-forge
    kind: ClusterSecretStore
  vaultToken:
    vaultPath: "forge/crossplane/vault-token"
  keycloakAdmin:
    vaultPath: "forge/keycloak"
    usernameProperty: "KC_BOOTSTRAP_ADMIN_USERNAME"
    passwordProperty: "KC_BOOTSTRAP_ADMIN_PASSWORD"
