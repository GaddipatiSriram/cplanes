# crossplane-providers — installs Crossplane providers and ProviderConfigs.
# Sibling to the crossplane core chart per its README.
#
# What's here today:
#   - provider-vault (upbound) — Terraform-backed Vault provider.
#   - provider-keycloak (crossplane-contrib) — Terraform-backed Keycloak provider.
#
# Vault provider authenticates via **Kubernetes auth** (no long-lived token).
# Crossplane's provider-vault pod presents its ServiceAccount JWT to Vault's
# kubernetes-mgmt-control auth mount, which validates against mgmt-control's
# kube-apiserver and issues a Vault token scoped to the crossplane-admin
# policy. Token lifetime is short (10m default); auto-refreshed.
#
# IRREDUCIBLE BOOTSTRAP (two `vault` CLI lines, run once via
# vault/playbooks/configure.yml):
#
#   # 1. The policy provider-vault uses to manage everything else
#   vault policy write crossplane-admin - <<'EOF'
#   path "sys/policies/acl/*"                  { capabilities = ["create","read","update","delete","list"] }
#   path "auth/kubernetes-mgmt-forge/role/*"   { capabilities = ["create","read","update","delete","list"] }
#   path "auth/kubernetes-mgmt-control/role/*" { capabilities = ["create","read","update","delete","list"] }
#   path "kv/data/forge/*"                     { capabilities = ["create","read","update","delete","list"] }
#   path "kv/metadata/forge/*"                 { capabilities = ["create","read","update","delete","list"] }
#   EOF
#
#   # 2. The Vault role that the provider-vault SA authenticates against
#   vault write auth/kubernetes-mgmt-control/role/crossplane \
#     bound_service_account_names='*' \
#     bound_service_account_namespaces=crossplane-system \
#     policies=crossplane-admin \
#     ttl=10m
#
# (`*` for SA names because Crossplane's package manager assigns the
# provider-vault controller SA a hash-suffixed name we can't predict
# stably without a DeploymentRuntimeConfig — the namespace bound is
# tight enough.)
#
# After these two lines, every other Vault role/policy is a Crossplane
# CR (see security/secrets/vault-config/). The Keycloak provider gets
# its admin creds from kv/forge/keycloak via ESO into Secret/keycloak-admin
# in crossplane-system — Vault is the single source of truth.

provider:
  vault:
    package: "xpkg.upbound.io/upbound/provider-vault:v1.0.0"
  # provider-keycloak — wraps the mrparkers Terraform Keycloak provider.
  # CRD API groups (best-known forms; verify with `kubectl get crds | grep keycloak`
  # after first install):
  #   realm.keycloak.crossplane.io           Realm
  #   openidclient.keycloak.crossplane.io    Client, ClientScope, ClientDefaultScopes,
  #                                          GroupMembershipProtocolMapper
  #   group.keycloak.crossplane.io           Group, DefaultGroups
  keycloak:
    package: "xpkg.upbound.io/crossplane-contrib/provider-keycloak:v1.6.0"

providerConfig:
  vault:
    address: "https://vault.apps.mgmt-forge.engatwork.com"
    # Kubernetes auth — no Secret needed. provider-vault's pod uses its
    # in-cluster SA token at /var/run/secrets/kubernetes.io/serviceaccount/token
    # to log in to Vault at the mount/role below.
    auth:
      mount: "kubernetes-mgmt-control"
      role: "crossplane"
  keycloak:
    url: "https://keycloak.apps.mgmt-forge.engatwork.com"
    basePath: "/auth"
    realm: "master"
    clientId: "admin-cli"
    # Admin creds materialized as Secret/keycloak-admin in crossplane-system
    # by templates/keycloak-admin-externalsecret.yaml. Sourced from the same
    # Vault path that bootstraps the Keycloak pod itself (kv/forge/keycloak).
    secretName: "keycloak-admin"

externalSecret:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-forge
    kind: ClusterSecretStore
  keycloakAdmin:
    vaultPath: "forge/keycloak"
    usernameProperty: "KC_BOOTSTRAP_ADMIN_USERNAME"
    passwordProperty: "KC_BOOTSTRAP_ADMIN_PASSWORD"
