# Values for the Argo Workflows umbrella chart on mgmt-control.
# Subchart name: `argo-workflows` — must match Chart.yaml dependency.
#
# Architecture:
#   - Workflow controller + server in `argo-workflows` namespace on mgmt-control
#   - UI at https://workflows.apps.mgmt-control.engatwork.com
#   - cert-manager + ingress-nginx (Pattern A baseline)
#   - No artifact repository yet (add MinIO or rook-ceph-external RGW later)
#   - authMode=server for bootstrap; switch to SSO once Keycloak OIDC client lands

argo-workflows:
  # mgmt-control argocd-sre is cluster-scoped (vanilla helm install) — we
  # can manage CRDs and ClusterRoles directly. The OKD-era kludges
  # (singleNamespace, createAggregateRoles=false, crds.install=false) are
  # all reversed.
  singleNamespace: false
  createAggregateRoles: true

  crds:
    install: true

  controller:
    workflowNamespaces:
      - argo-workflows
    clusterWorkflowTemplates:
      enabled: true

  server:
    enabled: true
    clusterWorkflowTemplates:
      enabled: true
    authModes:
      - server
    serviceType: ClusterIP

    ingress:
      enabled: true
      ingressClassName: nginx
      annotations:
        cert-manager.io/cluster-issuer: vault-pki
      hosts:
        - workflows.apps.mgmt-control.engatwork.com
      paths:
        - /
      pathType: Prefix
      tls:
        - hosts:
            - workflows.apps.mgmt-control.engatwork.com
          secretName: argo-workflows-tls

  workflow:
    serviceAccount:
      create: true
      name: argo-workflow
