{{- if .Values.oidc.enabled }}
# ExternalSecret — pulls this argocd instance's OIDC client credentials from
# Vault. Renders Secret/argocd-oidc with the labels that argocd-server expects
# in order to resolve `$argocd-oidc:client-secret` references inside
# configs.cm.oidc.config.
#
# Source: kv/forge/keycloak/clients/{{ .Values.oidc.clientName }} populated by
# the keycloak-client-secret-sync Job on mgmt-forge.

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: argocd-oidc
  annotations:
    argocd.argoproj.io/sync-wave: "0"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-forge
    kind: ClusterSecretStore
  target:
    name: argocd-oidc
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      metadata:
        labels:
          # Required for argocd-server to resolve `$argocd-oidc:<key>` refs.
          app.kubernetes.io/part-of: argocd
  data:
    - secretKey: client-id
      remoteRef:
        key: forge/keycloak/clients/{{ .Values.oidc.clientName }}
        property: client_id
    - secretKey: client-secret
      remoteRef:
        key: forge/keycloak/clients/{{ .Values.oidc.clientName }}
        property: client_secret
{{- end }}
