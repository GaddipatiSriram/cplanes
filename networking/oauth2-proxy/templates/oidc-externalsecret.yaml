# ExternalSecret — renders Secret/oauth2-proxy-oidc that the chart's
# `config.existingSecret` consumes. The keys MUST be:
#   client-id, client-secret, cookie-secret
# (oauth2-proxy chart looks for those exact names).
#
# Sources:
#   client-id, client-secret  ← kv/forge/keycloak/clients/apps-launcher
#                                (populated by keycloak-client-secret-sync Job)
#   cookie-secret             ← kv/forge/oauth2-proxy/cookie-secret
#                                (seeded once by the same Job)

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: oauth2-proxy-oidc
  annotations:
    argocd.argoproj.io/sync-wave: "0"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval | quote }}
  secretStoreRef:
    name: {{ .Values.externalSecret.secretStoreRef.name | quote }}
    kind: {{ .Values.externalSecret.secretStoreRef.kind | quote }}
  target:
    name: oauth2-proxy-oidc
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: client-id
      remoteRef:
        key: {{ .Values.externalSecret.vaultPaths.client | quote }}
        property: client_id
    - secretKey: client-secret
      remoteRef:
        key: {{ .Values.externalSecret.vaultPaths.client | quote }}
        property: client_secret
    - secretKey: cookie-secret
      remoteRef:
        key: {{ .Values.externalSecret.vaultPaths.cookie | quote }}
        property: cookie_secret
