# ApplicationSet — Backstage on every role=control cluster (currently: mgmt-control).
#
# First deploy uses the upstream demo image. Replace with a custom-built
# image once we have the real Backstage app config (auth, plugins,
# integrations) committed.
#
# Apply once:
#   kubectl --context mgmt-control apply -f argo-applications/sre/control/backstage-appset.yaml

apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: backstage
  namespace: argocd-sre
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - clusters:
        selector:
          matchLabels:
            role: control
  template:
    metadata:
      name: 'backstage-{{.name}}'
      labels:
        app.kubernetes.io/name: backstage
        app.kubernetes.io/part-of: platform
      annotations:
        argocd.argoproj.io/sync-wave: "2"
    spec:
      project: default
      source:
        repoURL: https://github.com/GaddipatiSriram/cplanes.git
        targetRevision: HEAD
        path: control/backstage
        helm:
          releaseName: backstage
      destination:
        server: '{{.server}}'
        namespace: backstage
      # ESO admission injects defaults (conversionStrategy/decodingStrategy/
      # metadataPolicy on data; engineVersion/mergePolicy on target.template)
      # that aren't in the chart source — suppress to keep the App Synced.
      ignoreDifferences:
        - group: external-secrets.io
          kind: ExternalSecret
          jsonPointers:
            - /spec/data
            - /spec/target/template/engineVersion
            - /spec/target/template/mergePolicy
      syncPolicy:
        automated:
          selfHeal: true
          prune: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
          - SkipDryRunOnMissingResource=true
          - RespectIgnoreDifferences=true
        retry:
          limit: 5
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 3m
