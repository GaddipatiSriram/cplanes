# ApplicationSet — Crossplane core on every role=control cluster (currently: mgmt-control).
#
# Apply once:
#   kubectl --context mgmt-control apply -f argo-applications/sre/control/crossplane-appset.yaml

apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: crossplane
  namespace: argocd-sre
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - clusters:
        selector:
          matchLabels:
            role: control
  template:
    metadata:
      name: 'crossplane-{{.name}}'
      labels:
        app.kubernetes.io/name: crossplane
        app.kubernetes.io/part-of: platform
      annotations:
        argocd.argoproj.io/sync-wave: "1"
    spec:
      project: default
      source:
        repoURL: https://github.com/GaddipatiSriram/cplanes.git
        targetRevision: HEAD
        path: control/crossplane
        helm:
          releaseName: crossplane
      destination:
        server: '{{.server}}'
        namespace: crossplane-system
      syncPolicy:
        automated:
          selfHeal: true
          prune: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
          - SkipDryRunOnMissingResource=true
        retry:
          limit: 5
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 3m
