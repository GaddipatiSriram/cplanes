# Application — Argo Workflows on OKD (in-cluster for argocd-sre).
#
# Pattern: same as argo-applications/sre/forge/*-appset.yaml but a plain Application CR
# since there's only ever one "OKD itself" cluster to target.
#
# Apply once:
#   kubectl --context admin apply -f argo-applications/sre/okd/argo-workflows-app.yaml

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argo-workflows-okd
  namespace: argocd-sre
  labels:
    app.kubernetes.io/name: argo-workflows
    app.kubernetes.io/part-of: platform
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://github.com/GaddipatiSriram/cplanes.git
    targetRevision: HEAD
    path: control/argo-workflows
    helm:
      releaseName: argo-workflows
  destination:
    server: https://kubernetes.default.svc
    namespace: argo-workflows
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
