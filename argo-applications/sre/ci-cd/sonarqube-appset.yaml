# ApplicationSet — SonarQube on every role=forge cluster (currently: mgmt-forge).
#
# Apply once:
#   kubectl --context mgmt-control apply -f argo-applications/sre/ci-cd/sonarqube-appset.yaml

apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: sonarqube
  namespace: argocd-sre
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - clusters:
        selector:
          matchLabels:
            role: forge
  template:
    metadata:
      name: 'sonarqube-{{.name}}'
      labels:
        app.kubernetes.io/name: sonarqube
        app.kubernetes.io/part-of: platform
      annotations:
        argocd.argoproj.io/sync-wave: "2"
    spec:
      project: default
      source:
        repoURL: https://github.com/GaddipatiSriram/cplanes.git
        targetRevision: HEAD
        path: ci-cd/sonarqube
        helm:
          releaseName: sonarqube
      destination:
        server: '{{.server}}'
        namespace: sonarqube
      ignoreDifferences:
        - group: apps
          kind: StatefulSet
          name: sonarqube-sonarqube
          jsonPointers:
            - /spec/volumeClaimTemplates
        - group: apps
          kind: StatefulSet
          name: sonarqube-postgresql
          jsonPointers:
            - /spec/volumeClaimTemplates
      syncPolicy:
        automated:
          selfHeal: true
          prune: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
          - SkipDryRunOnMissingResource=true
        retry:
          limit: 5
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 3m
