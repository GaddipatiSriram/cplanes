# Application — Jenkins on OKD (in-cluster for argocd-sre).
#
# Apply once:
#   kubectl --context admin apply -f argo-applications/sre/okd/jenkins-app.yaml

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: jenkins-okd
  namespace: argocd-sre
  labels:
    app.kubernetes.io/name: jenkins
    app.kubernetes.io/part-of: platform
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://github.com/GaddipatiSriram/cplanes.git
    targetRevision: HEAD
    path: ci-cd/jenkins
    helm:
      releaseName: jenkins
  destination:
    server: https://kubernetes.default.svc
    namespace: jenkins
  # Jenkins StatefulSet PVC template normalizes out — ignore so Argo doesn't
  # thrash on it every sync (same pattern as vault/keycloak).
  ignoreDifferences:
    - group: apps
      kind: StatefulSet
      name: jenkins
      jsonPointers:
        - /spec/volumeClaimTemplates
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
