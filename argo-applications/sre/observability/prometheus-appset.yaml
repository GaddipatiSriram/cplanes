# ApplicationSet — Prometheus + prometheus-operator on observability cluster.
#
# Pattern C selector role=observ — matches mgmt-observability today; future
# observability-tier clusters (HA standby, regional) join automatically.
#
# Sync wave 0.  Grafana (wave 1) and Alertmanager (wave 0 sibling) come
# in separate sibling charts; the operator + CRDs installed here serve
# all three.
#
# Apply once:
#   kubectl --context admin apply -f argo-applications/sre/observability/prometheus-appset.yaml

apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: prometheus
  namespace: argocd-sre
spec:
  generators:
    - clusters:
        selector:
          matchLabels:
            role: observ
  template:
    metadata:
      name: 'prometheus-{{name}}'
      labels:
        app.kubernetes.io/name: prometheus
        app.kubernetes.io/part-of: observability
      annotations:
        argocd.argoproj.io/sync-wave: "0"
    spec:
      project: default
      source:
        repoURL: https://github.com/GaddipatiSriram/cplanes.git
        targetRevision: HEAD
        path: observability/prometheus
        helm:
          releaseName: prometheus
      destination:
        server: '{{server}}'
        namespace: observability
      # The kube-prometheus-stack CRDs are large (BFD profiles, Prometheus,
      # Alertmanager, ThanosRuler, ServiceMonitor, etc.).  ServerSideApply
      # avoids the "metadata.annotations: Too long" failure that
      # client-side apply hits on these CRDs.
      syncPolicy:
        automated:
          selfHeal: true
          prune: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
          - SkipDryRunOnMissingResource=true
        retry:
          limit: 5
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 3m
      # The operator mutates its own Prometheus/Alertmanager CRs at
      # runtime (status, observed generation, conversion webhook caBundle
      # on the operator-managed CRDs).  Same drift pattern as the
      # metallb bgppeers CRD — silence cosmetically.
      ignoreDifferences:
        - group: apiextensions.k8s.io
          kind: CustomResourceDefinition
          jqPathExpressions:
            - .spec.conversion.webhook.clientConfig.caBundle
