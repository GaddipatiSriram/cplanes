# ApplicationSet — kube-state-metrics on every workload cluster (Pattern A).
#
# Sync wave 1 — same CRD prerequisite as node-exporter.

apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: kube-state-metrics
  namespace: argocd-sre
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - clusters:
        selector:
          matchExpressions:
            - { key: tier, operator: In, values: [mgmt, dev] }
  template:
    metadata:
      name: 'kube-state-metrics-{{.name}}'
      labels:
        app.kubernetes.io/name: kube-state-metrics
        app.kubernetes.io/part-of: observability
      annotations:
        argocd.argoproj.io/sync-wave: "1"
    spec:
      project: default
      source:
        repoURL: https://github.com/GaddipatiSriram/cplanes.git
        targetRevision: HEAD
        path: observability/agents/kube-state-metrics
        helm:
          releaseName: kube-state-metrics
      destination:
        server: '{{.server}}'
        namespace: observability
      syncPolicy:
        automated:
          selfHeal: true
          prune: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
          - SkipDryRunOnMissingResource=true
          - RespectIgnoreDifferences=true
        retry:
          limit: 5
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 3m
