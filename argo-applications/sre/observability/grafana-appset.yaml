# ApplicationSet — Grafana on observability cluster.
#
# Pattern C selector role=observ. Sync wave 1 — Prometheus +
# Alertmanager (wave 0) need to be Services before Grafana provisions
# its datasources (otherwise it boots, fails the datasource health
# check, and reports them red until next reconcile).
#
# OIDC via Keycloak deferred — see chart's values.yaml comment.
#
# Apply:
#   kubectl --context admin apply -f argo-applications/sre/observability/grafana-appset.yaml

apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: grafana
  namespace: argocd-sre
spec:
  generators:
    - clusters:
        selector:
          matchLabels:
            role: observ
  template:
    metadata:
      name: 'grafana-{{name}}'
      labels:
        app.kubernetes.io/name: grafana
        app.kubernetes.io/part-of: observability
      annotations:
        argocd.argoproj.io/sync-wave: "1"
    spec:
      project: default
      source:
        repoURL: https://github.com/GaddipatiSriram/cplanes.git
        targetRevision: HEAD
        path: observability/grafana
        helm:
          releaseName: grafana
      destination:
        server: '{{server}}'
        namespace: observability
      syncPolicy:
        automated:
          selfHeal: true
          prune: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
          - SkipDryRunOnMissingResource=true
        retry:
          limit: 5
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 3m
