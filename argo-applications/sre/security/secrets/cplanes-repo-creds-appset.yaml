# ApplicationSet — Vault-backed cplanes-repo Secret on every role=control
# cluster (currently: mgmt-control).
#
# Renders ExternalSecret CRs in argocd-sre + argocd-devops namespaces that
# pull the GitHub PAT from kv/forge/github and template the ArgoCD
# repo-cred Secret `cplanes-repo`. Replaces the bootstrap kubectl-applied
# plaintext-PAT Secret with a Vault-sourced one.
#
# Prerequisites (must be Synced+Healthy first):
#   - external-secrets         (wave 1) — ESO controller running
#   - ClusterSecretStore       (wave 2) — vault-forge Valid (auth mount exists)
#
# Apply once:
#   kubectl --context mgmt-control apply -f argo-applications/sre/security/secrets/cplanes-repo-creds-appset.yaml

apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: cplanes-repo-creds
  namespace: argocd-sre
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - clusters:
        selector:
          matchLabels:
            role: control
  template:
    metadata:
      name: 'cplanes-repo-creds-{{.name}}'
      labels:
        app.kubernetes.io/name: cplanes-repo-creds
        app.kubernetes.io/part-of: platform
      annotations:
        argocd.argoproj.io/sync-wave: "3"
    spec:
      project: default
      source:
        repoURL: https://github.com/GaddipatiSriram/cplanes.git
        targetRevision: HEAD
        path: security/secrets/cplanes-repo-creds
        helm:
          releaseName: cplanes-repo-creds
      destination:
        server: '{{.server}}'
        namespace: external-secrets   # ExternalSecret resources have explicit metadata.namespace per template; this is just where Helm release info lives
      syncPolicy:
        automated:
          selfHeal: true
          prune: true
        syncOptions:
          - CreateNamespace=false
          - ServerSideApply=true
          - SkipDryRunOnMissingResource=true
        retry:
          limit: 5
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 3m
