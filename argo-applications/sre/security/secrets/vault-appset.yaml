# ApplicationSet — Vault on every role=forge cluster (currently: mgmt-forge)
#
# Pattern B (umbrella chart): single source points at vault/ in the git repo root.
# ArgoCD's repo-server runs `helm dependency build` on Chart.yaml, pulls
# hashicorp/vault v0.29.1, and renders with values.yaml.
#
# Prerequisites (must be Synced+Healthy first):
#   - cert-manager        (wave 0)
#   - ingress-nginx       (wave 0)
#   - storage class       (local-path-provisioner on forge)
#
# First-time bootstrap after Application goes Synced:
#   kubectl --context mgmt-forge exec -it -n vault vault-0 -- vault operator init
#   # save the 5 unseal keys + 1 root token it prints
#   kubectl --context mgmt-forge exec -it -n vault vault-0 -- vault operator unseal <key>  # x3
#   # repeat for vault-1 and vault-2
#
# Apply once:
#   kubectl --context admin apply -f argo-applications/sre/forge/vault-appset.yaml

apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: vault
  namespace: argocd-sre
spec:
  generators:
    - clusters:
        selector:
          matchLabels:
            role: forge
  template:
    metadata:
      name: 'vault-{{name}}'
      labels:
        app.kubernetes.io/name: vault
        app.kubernetes.io/part-of: platform
      annotations:
        argocd.argoproj.io/sync-wave: "1"
    spec:
      project: default
      source:
        repoURL: https://github.com/GaddipatiSriram/cplanes.git
        targetRevision: HEAD
        path: security/secrets/vault
        helm:
          releaseName: vault
      destination:
        server: '{{server}}'
        namespace: vault
      # Kubernetes defaults StatefulSet volumeClaimTemplates fields after apply
      # (status.capacity, annotations, managed-by labels). ArgoCD+SSA sees that
      # as drift. Ignore those specific paths — pods still reconcile on real
      # spec changes.
      ignoreDifferences:
        - group: apps
          kind: StatefulSet
          name: vault
          jsonPointers:
            - /spec/volumeClaimTemplates
      syncPolicy:
        automated:
          selfHeal: true
          prune: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
        retry:
          limit: 5
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 3m
