# ApplicationSet — External Secrets Operator on every role=forge cluster.
#
# Pattern B: umbrella chart pinning external-secrets v0.10.4 + templates/
# for the forge-specific ClusterSecretStore (points at Vault on forge) and
# an optional smoke-test ExternalSecret.
#
# Prerequisites (must be Synced+Healthy first):
#   - cert-manager        (wave 0) — ESO webhook needs cert-manager CA injection
#   - vault               (wave 1) — ESO authenticates against Vault
#   - Vault post-install  (playbook ran: KV v2 + k8s auth + forge-reader role)
#
# After sync, verify the loop:
#   kubectl --context mgmt-forge get clustersecretstore vault-forge
#   kubectl --context mgmt-forge get externalsecret -A
#   kubectl --context mgmt-forge get secret hello-from-vault -n default -o jsonpath='{.data.message}' | base64 -d
#   # expected: "hello from vault"

apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: external-secrets
  namespace: argocd-sre
spec:
  generators:
    - clusters:
        selector:
          # Pattern A — every workload-capable cluster needs ESO to pull
          # secrets from Vault. Matches mgmt-forge, mgmt-observability,
          # mgmt-core, dev-*. Excludes mgmt-storage (no secrets to fetch;
          # Ceph auth is via cephx, not Vault).
          matchExpressions:
            - { key: tier, operator: In,    values: [mgmt, dev] }
            - { key: role, operator: NotIn, values: [storage] }
  template:
    metadata:
      name: 'external-secrets-{{name}}'
      labels:
        app.kubernetes.io/name: external-secrets
        app.kubernetes.io/part-of: platform
      annotations:
        argocd.argoproj.io/sync-wave: "1"
    spec:
      project: default
      source:
        repoURL: https://github.com/GaddipatiSriram/cplanes.git
        targetRevision: HEAD
        path: security/secrets/external-secrets
        helm:
          releaseName: external-secrets
          # Per-cluster Vault auth-method mount name. Vault has one
          # `kubernetes-<cluster>/` mount per registered cluster, each
          # configured against that cluster's own apiserver for TokenReview.
          # See forge/vault/playbooks/configure_pki.yml (todo) for the
          # bootstrap.
          parameters:
            - name: vault.kubernetesAuthMount
              value: 'kubernetes-{{name}}'
      destination:
        server: '{{server}}'
        namespace: external-secrets
      syncPolicy:
        automated:
          selfHeal: true
          prune: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
          - SkipDryRunOnMissingResource=true
        retry:
          limit: 5
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 3m
