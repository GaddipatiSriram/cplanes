# ApplicationSet — declarative Vault configuration on every role=control
# cluster (currently mgmt-control, where Crossplane lives).
#
# Even though the Vault server runs on mgmt-forge, this chart targets
# mgmt-control: the rendered objects are Crossplane CRs (Policy,
# AuthBackendRole), and Crossplane only runs on mgmt-control. The
# provider-vault controller in that cluster reaches Vault remotely.
#
# Wave 4 — must run after crossplane-providers (wave 2) has installed the
# CRDs and the ProviderConfig is online.
#
# Discovery: picked up by sre-root-app.yaml — no kubectl needed.

apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: vault-config
  namespace: argocd-sre
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - clusters:
        selector:
          matchLabels:
            role: control
  template:
    metadata:
      name: 'vault-config-{{.name}}'
      labels:
        app.kubernetes.io/name: vault-config
        app.kubernetes.io/part-of: platform
      annotations:
        argocd.argoproj.io/sync-wave: "4"
    spec:
      project: default
      source:
        repoURL: https://github.com/GaddipatiSriram/cplanes.git
        targetRevision: HEAD
        path: security/secrets/vault-config
        helm:
          releaseName: vault-config
      destination:
        server: '{{.server}}'
        namespace: crossplane-system
      syncPolicy:
        automated:
          selfHeal: true
          prune: true
        syncOptions:
          - CreateNamespace=false
          - ServerSideApply=true
          - SkipDryRunOnMissingResource=true
        retry:
          limit: 10
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 3m
