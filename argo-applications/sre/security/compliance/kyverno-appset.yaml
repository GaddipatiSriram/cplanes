# ApplicationSet — Kyverno policy engine on role=control clusters.
#
# Pattern: role=control only initially (mgmt-control). Fan to all
# workload clusters later when policy library matures and we want
# admission enforcement everywhere.
#
# Sync wave 2 — alongside other security/policy services.

apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: kyverno
  namespace: argocd-sre
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - clusters:
        selector:
          matchLabels:
            role: control
  template:
    metadata:
      name: 'kyverno-{{.name}}'
      labels:
        app.kubernetes.io/name: kyverno
        app.kubernetes.io/part-of: security-compliance
      annotations:
        argocd.argoproj.io/sync-wave: "2"
    spec:
      project: default
      source:
        repoURL: https://github.com/GaddipatiSriram/cplanes.git
        targetRevision: HEAD
        path: security/compliance/kyverno
        helm:
          releaseName: kyverno
      destination:
        server: '{{.server}}'
        namespace: kyverno
      syncPolicy:
        automated:
          selfHeal: true
          prune: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
          - SkipDryRunOnMissingResource=true
          - RespectIgnoreDifferences=true
        retry:
          limit: 5
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 3m
      ignoreDifferences:
        # Kyverno's CRDs don't have managedFields populated (helm
        # installed them via crds/ dir, not SSA), so managedFieldsManagers
        # is a no-op. Falling back to broad jq ignore on .spec — these
        # CRDs are owned by the helm chart; ArgoCD doesn't need to police
        # their schema content. A `helm upgrade` will update them.
        - group: apiextensions.k8s.io
          kind: CustomResourceDefinition
          jqPathExpressions:
            - .spec
        # Webhook caBundles get rewritten by cert-controller; ignore.
        - group: admissionregistration.k8s.io
          kind: ValidatingWebhookConfiguration
          jqPathExpressions:
            - .webhooks[]?.clientConfig.caBundle
        - group: admissionregistration.k8s.io
          kind: MutatingWebhookConfiguration
          jqPathExpressions:
            - .webhooks[]?.clientConfig.caBundle
