# ApplicationSet — Kyverno policy engine on role=control clusters.
#
# Pattern: role=control only initially (mgmt-control). Fan to all
# workload clusters later when policy library matures and we want
# admission enforcement everywhere.
#
# Sync wave 2 — alongside other security/policy services.

apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: kyverno
  namespace: argocd-sre
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - clusters:
        selector:
          matchLabels:
            role: control
  template:
    metadata:
      name: 'kyverno-{{.name}}'
      labels:
        app.kubernetes.io/name: kyverno
        app.kubernetes.io/part-of: security-compliance
      annotations:
        argocd.argoproj.io/sync-wave: "2"
    spec:
      project: default
      source:
        repoURL: https://github.com/GaddipatiSriram/cplanes.git
        targetRevision: HEAD
        path: security/compliance/kyverno
        helm:
          releaseName: kyverno
      destination:
        server: '{{.server}}'
        namespace: kyverno
      syncPolicy:
        automated:
          selfHeal: true
          prune: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
          - SkipDryRunOnMissingResource=true
          - RespectIgnoreDifferences=true
        retry:
          limit: 5
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 3m
      ignoreDifferences:
        # CRDs: k8s API server normalizes OpenAPI schemas + adds defaults
        # (.spec.conversion, schema property ordering, etc.). Use
        # managedFieldsManagers to ignore any field the API server owns
        # vs what helm submitted. This is the canonical pattern for
        # CRD drift.
        - group: apiextensions.k8s.io
          kind: CustomResourceDefinition
          managedFieldsManagers:
            - kube-controller-manager
            - kube-apiserver
        # Webhook caBundles get patched by cert-manager / chart's own
        # injection; same managedFields pattern.
        - group: admissionregistration.k8s.io
          kind: ValidatingWebhookConfiguration
          managedFieldsManagers:
            - kube-controller-manager
            - kyverno
        - group: admissionregistration.k8s.io
          kind: MutatingWebhookConfiguration
          managedFieldsManagers:
            - kube-controller-manager
            - kyverno
