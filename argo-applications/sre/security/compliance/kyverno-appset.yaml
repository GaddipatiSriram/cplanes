# ApplicationSet — Kyverno policy engine on role=control clusters.
#
# Pattern: role=control only initially (mgmt-control). Fan to all
# workload clusters later when policy library matures and we want
# admission enforcement everywhere.
#
# Sync wave 2 — alongside other security/policy services.

apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: kyverno
  namespace: argocd-sre
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - clusters:
        selector:
          matchLabels:
            role: control
  template:
    metadata:
      name: 'kyverno-{{.name}}'
      labels:
        app.kubernetes.io/name: kyverno
        app.kubernetes.io/part-of: security-compliance
      annotations:
        argocd.argoproj.io/sync-wave: "2"
    spec:
      project: default
      source:
        repoURL: https://github.com/GaddipatiSriram/cplanes.git
        targetRevision: HEAD
        path: security/compliance/kyverno
        helm:
          releaseName: kyverno
      destination:
        server: '{{.server}}'
        namespace: kyverno
      syncPolicy:
        automated:
          selfHeal: true
          prune: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
          - SkipDryRunOnMissingResource=true
          - RespectIgnoreDifferences=true
        retry:
          limit: 5
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 3m
      ignoreDifferences:
        # k8s API server defaults `.spec.conversion: {strategy: None}` on
        # any CRD that doesn't declare conversion explicitly. The chart
        # omits the block; the live object has it. Cosmetic drift.
        - group: apiextensions.k8s.io
          kind: CustomResourceDefinition
          jsonPointers:
            - /spec/conversion
        - group: admissionregistration.k8s.io
          kind: ValidatingWebhookConfiguration
          jsonPointers:
            - /webhooks/0/clientConfig/caBundle
            - /webhooks/1/clientConfig/caBundle
            - /webhooks/2/clientConfig/caBundle
            - /webhooks/3/clientConfig/caBundle
            - /webhooks/4/clientConfig/caBundle
            - /webhooks/5/clientConfig/caBundle
            - /webhooks/6/clientConfig/caBundle
            - /webhooks/7/clientConfig/caBundle
            - /webhooks/8/clientConfig/caBundle
            - /webhooks/9/clientConfig/caBundle
        - group: admissionregistration.k8s.io
          kind: MutatingWebhookConfiguration
          jsonPointers:
            - /webhooks/0/clientConfig/caBundle
            - /webhooks/1/clientConfig/caBundle
            - /webhooks/2/clientConfig/caBundle
