# ApplicationSet — OPA Gatekeeper policy engine on role=control clusters.
#
# Coexists with Kyverno on the same cluster — different webhook
# namespaces, different resource paths.
#
# Sync wave 2 — alongside other security/policy services.

apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: opa-gatekeeper
  namespace: argocd-sre
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - clusters:
        selector:
          matchLabels:
            role: control
  template:
    metadata:
      name: 'opa-gatekeeper-{{.name}}'
      labels:
        app.kubernetes.io/name: opa-gatekeeper
        app.kubernetes.io/part-of: security-compliance
      annotations:
        argocd.argoproj.io/sync-wave: "2"
    spec:
      project: default
      source:
        repoURL: https://github.com/GaddipatiSriram/cplanes.git
        targetRevision: HEAD
        path: security/compliance/opa-gatekeeper
        helm:
          releaseName: opa-gatekeeper
      destination:
        server: '{{.server}}'
        namespace: gatekeeper-system
      syncPolicy:
        automated:
          selfHeal: true
          prune: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
          - SkipDryRunOnMissingResource=true
          - RespectIgnoreDifferences=true
        retry:
          limit: 5
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 3m
      ignoreDifferences:
        - group: apiextensions.k8s.io
          kind: CustomResourceDefinition
          jqPathExpressions:
            - .spec.conversion.webhook.clientConfig.caBundle
        - group: admissionregistration.k8s.io
          kind: ValidatingWebhookConfiguration
          jqPathExpressions:
            - .webhooks[].clientConfig.caBundle
        - group: admissionregistration.k8s.io
          kind: MutatingWebhookConfiguration
          jqPathExpressions:
            - .webhooks[].clientConfig.caBundle
