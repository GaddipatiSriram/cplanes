# Values for observability/agents/promtail (Pattern A umbrella chart).
#
# AppSet sets per-cluster `promtail.cluster` (a scalar) via
# helm.parameters at generation time; the subchart's config.file runs
# `tpl` over the clients block, so `cluster: '{{ .Values.cluster }}'`
# below resolves at render time to whatever the AppSet supplied.

promtail:
  # External label that tags every log stream this Promtail ships.
  # Scalar (not a nested array index) — that's the whole point of
  # this value: --set promtail.cluster=<name> works cleanly, whereas
  # --set promtail.config.clients[0].external_labels.cluster=<name>
  # replaces the entire clients[0] block, losing url/batchsize/etc.
  cluster: ""

  # =============================================================================
  # Daemonset & host volume mounts
  # =============================================================================
  daemonset:
    enabled: true

  # Tolerate every taint — control-plane, master, dedicated nodes.
  # Logs from system pods on tainted nodes are valuable.
  tolerations:
    - effect: NoSchedule
      operator: Exists
    - effect: NoExecute
      operator: Exists

  # Promtail reads /var/log/pods (kubelet writes container logs there)
  # plus /var/lib/docker/containers (older docker runtime).  Defaults
  # ship both — keep them.

  # =============================================================================
  # Resources — DaemonSet × N nodes; keep small
  # =============================================================================
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

  # =============================================================================
  # Promtail config
  # =============================================================================
  config:
    clients:
      - url: "https://loki.apps.mgmt-observability.engatwork.com/loki/api/v1/push"
        # external_labels are added to EVERY stream this client sends.
        # The subchart wraps `clients` with `tpl`, so this Go-template
        # expression resolves to whatever AppSet set
        # `promtail.cluster` to.  See top of file for context.
        external_labels:
          cluster: "{{ .Values.cluster }}"
        # TODO: drop once Promtail trusts the engatwork.com Root CA.
        # The Loki ingress now serves a vault-pki cert (signed by
        # engatwork CA) — but Promtail's container has only the public
        # trust roots, not engatwork CA.  Phase 2 of the cert-manager
        # work mounts the CA bundle into Promtail and drops this skip.
        # See SESSION-NOTES "Outstanding TLS workarounds".
        tls_config:
          insecure_skip_verify: true
        # Backoff policy — bound retries so a temporarily-unreachable
        # Loki doesn't blow Promtail's memory queueing pushes.
        backoff_config:
          min_period: 500ms
          max_period: 5m
          max_retries: 10
        # Don't queue forever; drop old data if Loki is down >5m.
        batchsize: 1048576
        batchwait: 1s
        timeout: 10s

  # ServiceMonitor enabled — prometheus-agent (Pattern A) installs the
  # operator CRDs on every workload cluster, so Promtail's metrics get
  # auto-scraped (queue depth, dropped lines, push errors).
  serviceMonitor:
    enabled: true
    labels:
      app.kubernetes.io/part-of: observability

  # PriorityClass so Promtail outranks ordinary workloads when nodes
  # are pressured — losing logs during incidents is worst-case for SRE.
  priorityClassName: system-node-critical
