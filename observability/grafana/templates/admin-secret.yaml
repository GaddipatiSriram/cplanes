{{- /*
Bootstrap admin credentials Secret.

Plaintext password is OK for an initial install — `admin` / `unix` is
homelab-tier acceptable, and the Grafana UI will force a password
change on first login if `security.disable_initial_admin_creation`
isn't set (it isn't). Real ops: replace with an ExternalSecret pulling
kv/forge/grafana/admin-password from Vault.

Lives in templates/ rather than as a sibling Helm release because
Grafana's `existingSecret` value just wants a Secret in the release
namespace with the right keys.
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: grafana-admin-credentials
  namespace: {{ .Release.Namespace | quote }}
  annotations:
    argocd.argoproj.io/sync-wave: "0"
type: Opaque
stringData:
  admin-user: admin
  admin-password: unix
