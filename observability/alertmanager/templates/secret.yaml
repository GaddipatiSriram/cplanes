{{- /*
Routing config Secret. The operator mounts this into Alertmanager pods
as `alertmanager.yaml`. Secret name is fixed (operator searches by
`alertmanager-<CR-name>`), the data field MUST be the literal string
`alertmanager.yaml`.
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-main
  namespace: {{ .Release.Namespace | quote }}
type: Opaque
stringData:
  alertmanager.yaml: |
{{ toYaml .Values.config | indent 4 }}
