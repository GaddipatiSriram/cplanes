{{- /*
Minimal postgres for SonarQube — single pod, single PVC, upstream image.

Why this exists in the chart:
  bitnami/postgresql charts pull from docker.io/bitnami/* tags that were
  deleted in Aug 2025. CNPG would be cleaner but isn't deployed yet
  (#14). To unblock SonarQube without depending on bitnami, this chart
  ships a small postgres pod using the upstream postgres:17 image.

  Replace with a CNPG Cluster CR once #14 lands — at which point this
  template + the matching values.postgres block become DELETE candidates.
*/}}

apiVersion: v1
kind: Secret
metadata:
  name: sonarqube-postgres
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: sonarqube
type: Opaque
stringData:
  POSTGRES_USER: {{ .Values.postgres.user | quote }}
  POSTGRES_PASSWORD: {{ .Values.postgres.password | quote }}
  POSTGRES_DB: {{ .Values.postgres.database | quote }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sonarqube-postgres
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: sonarqube
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ .Values.postgres.storageClass | quote }}
  resources:
    requests:
      storage: {{ .Values.postgres.storage | quote }}
---
apiVersion: v1
kind: Service
metadata:
  name: sonarqube-postgres
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: sonarqube
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
      name: postgres
  selector:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: sonarqube
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sonarqube-postgres
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: sonarqube
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
      app.kubernetes.io/part-of: sonarqube
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres
        app.kubernetes.io/part-of: sonarqube
    spec:
      containers:
        - name: postgres
          image: {{ .Values.postgres.image | quote }}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
              name: postgres
          envFrom:
            - secretRef:
                name: sonarqube-postgres
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1
              memory: 1Gi
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "$(POSTGRES_USER)"]
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "$(POSTGRES_USER)"]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: sonarqube-postgres
