# Values for the SonarQube umbrella chart on mgmt-forge.
#
# Architecture:
#   - sonarsource/sonarqube subchart (the official one) — runs SonarQube
#     itself. It dropped bundled postgres in 2026.x; we bring our own.
#   - Local postgres Deployment + PVC rendered by this chart's
#     templates/postgres.yaml — single pod, upstream postgres:17 image,
#     no bitnami dependency.
#   - Ingress at sonarqube.apps.mgmt-forge.engatwork.com via ingress-nginx
#     + cert-manager.
#   - Initial admin: admin/admin (rotate on first login; SSO via Keycloak
#     comes later via the SonarQube OAuth/SAML plugin).
#
# When CNPG (#14) lands, replace this local postgres with a CNPG Cluster
# CR and delete templates/postgres.yaml + the .postgres values block.

# =============================================================================
# Local postgres (in-chart Deployment)
# =============================================================================
postgres:
  image: postgres:17.6
  user: sonarqube
  password: sonarqube_dev_password   # rotate via Vault/ESO when forge/todo C5 lands
  database: sonarqube
  storageClass: ceph-rbd
  storage: 10Gi

# =============================================================================
# SonarQube (sonarsource/sonarqube subchart values)
# =============================================================================
sonarqube:
  community:
    enabled: true             # Community Build — chart's required toggle for the free edition.
                              # Note: do NOT also set `edition: community` — chart errors out
                              # with "edition is not a valid edition" if both are set.

  # Required by sonarsource/sonarqube 2026.x — chart fails helm template
  # validation without it. Inline for now; rotate via Vault/ESO when
  # forge/todo C5 lands (same pattern as the postgres password below).
  monitoringPasscode: "homelab_dev_monitor_passcode"

  # Point at our in-chart postgres
  jdbcOverwrite:
    enable: true
    jdbcUrl: "jdbc:postgresql://sonarqube-postgres:5432/sonarqube"
    jdbcUsername: "sonarqube"
    jdbcSecretName: "sonarqube-postgres"
    jdbcSecretPasswordKey: "POSTGRES_PASSWORD"

  # SonarQube-side persistence (logs, plugins, extensions; smaller than
  # postgres data).
  persistence:
    enabled: true
    storageClass: ceph-rbd
    accessMode: ReadWriteOnce
    size: 10Gi

  # Ingress (nginx + cert-manager)
  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
      - name: sonarqube.apps.mgmt-forge.engatwork.com
        path: /
        pathType: Prefix
    tls:
      - hosts:
          - sonarqube.apps.mgmt-forge.engatwork.com
        secretName: sonarqube-tls
    annotations:
      cert-manager.io/cluster-issuer: vault-pki

  service:
    type: ClusterIP

  resources:
    requests:
      cpu: 200m
      memory: 2Gi
    limits:
      cpu: 2
      memory: 4Gi
