# Values for the SonarQube umbrella chart on mgmt-forge.
# Subchart name: `sonarqube` — must match Chart.yaml dependency.
#
# Architecture (bitnami/sonarqube 8.1.17):
#   - SonarQube + bundled PostgreSQL (single chart, no sub-coordination
#     needed — sonarsource's own chart dropped postgres in 2026.x; bitnami
#     still bundles it).
#   - SonarQube data PVC on ceph-rbd (logs, plugins, extensions).
#   - PostgreSQL data PVC on ceph-rbd.
#   - Ingress at sonarqube.apps.mgmt-forge.engatwork.com via ingress-nginx
#     + cert-manager.
#   - Initial admin: admin/admin (rotate on first login; SSO via Keycloak
#     comes later via the SonarQube OAuth/SAML plugin).

sonarqube:
  # SonarQube image — bitnami pulled named tags off docker.io/bitnami in
  # Aug 2025; current free images live under docker.io/bitnamilegacy.
  image:
    registry: docker.io
    repository: bitnamilegacy/sonarqube
    tag: 25.8.0-debian-12-r2
    pullPolicy: IfNotPresent

  # Resources — bump after first soak.
  resources:
    requests:
      cpu: 200m
      memory: 2Gi
    limits:
      cpu: 2
      memory: 4Gi

  # SonarQube data persistence.
  persistence:
    enabled: true
    storageClass: ceph-rbd
    accessModes:
      - ReadWriteOnce
    size: 20Gi

  # Ingress (nginx + cert-manager)
  ingress:
    enabled: true
    ingressClassName: nginx
    hostname: sonarqube.apps.mgmt-forge.engatwork.com
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
    tls: true

  service:
    type: ClusterIP

  # Bundled PostgreSQL.
  postgresql:
    enabled: true
    # Same docker.io → bitnamilegacy migration as SonarQube image above.
    # The bitnami sonarqube chart pins an OLD postgres tag that no longer
    # exists on docker.io/bitnami; force the current legacy tag.
    image:
      registry: docker.io
      repository: bitnamilegacy/postgresql
      tag: 17.6.0-debian-12-r4
    auth:
      username: bn_sonarqube
      password: sonarPass         # rotate via Vault/ESO when forge/todo C5 lands
      database: bitnami_sonarqube
    primary:
      persistence:
        enabled: true
        storageClass: ceph-rbd
        size: 20Gi

  # SonarQube wants vm.max_map_count high enough for ES; the chart's
  # init container handles it.
  initContainers:
    sysctl:
      enabled: true
