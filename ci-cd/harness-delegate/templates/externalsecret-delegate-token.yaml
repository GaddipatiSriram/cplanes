# ExternalSecret — mirrors Harness SaaS delegate token from Vault
# (kv/forge/harness/delegate) into Secret/harness-delegate-token in this
# namespace.
#
# Sync timing: the subchart Deployment references this Secret as an env source.
# ESO materializes the Secret within ~10s of reconcile, so the Deployment will
# CrashLoopBackOff briefly on first install before stabilizing. This is normal.
#
# ACCOUNT_ID intentionally not pulled here — it's non-secret (visible in your
# Harness URL) and is wired as a plain Helm value in values.yaml.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: harness-delegate-token
  labels:
    app.kubernetes.io/part-of: platform
    app.kubernetes.io/name: harness-delegate
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-forge
  target:
    name: harness-delegate-token
    creationPolicy: Owner
  data:
    - secretKey: DELEGATE_TOKEN
      remoteRef:
        key: forge/harness/delegate
        property: DELEGATE_TOKEN
