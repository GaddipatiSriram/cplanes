# Values for the Jenkins umbrella chart on mgmt-control.
# Subchart name: `jenkins` — must match Chart.yaml dependency.
#
# Architecture:
#   - Single controller pod (StatefulSet) with 20Gi ceph-rbd PVC
#   - UI at https://jenkins.apps.mgmt-control.engatwork.com
#   - cert-manager + ingress-nginx (Pattern A)
#   - Admin creds chart-generated; migrate to Vault/ESO later (same pattern
#     as forge/keycloak)
#   - ceph-rbd via the rook-ceph-external CSI bundle on mgmt-control

jenkins:
  controller:
    # Vanilla kubeadm — no SCCs to satisfy; default chart UID/GID stand.
    # (OKD's runAsUser:null kludge is reversed.)
    image:
      tag: "2.541.1-jdk17"

    serviceType: ClusterIP

    ingress:
      enabled: true
      ingressClassName: nginx
      hostName: jenkins.apps.mgmt-control.engatwork.com
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
      tls:
        - hosts:
            - jenkins.apps.mgmt-control.engatwork.com
          secretName: jenkins-tls

    # Admin creds: chart generates random password on first install, stored
    # in Secret/jenkins. Retrieve via:
    #   kubectl -n jenkins get secret jenkins -o jsonpath='{.data.jenkins-admin-password}' | base64 -d
    # Migrate to Vault later by setting admin.createSecret: false and mounting
    # a Vault-backed Secret via ESO.
    admin:
      createSecret: true

    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        cpu: 2
        memory: 2Gi

  agent:
    enabled: true

  persistence:
    enabled: true
    storageClass: ceph-rbd
    size: 20Gi
    accessMode: ReadWriteOnce

  serviceAccount:
    create: true
    name: jenkins
